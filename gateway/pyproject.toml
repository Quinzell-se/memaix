[project]
name = "memaix-gateway"
version = "0.1.0"
description = "Memaix — self-hosted, AI-agnostic assistant gateway (MCP)"
requires-python = ">=3.12"
license = { text = "AGPL-3.0-or-later" }
dependencies = [
    # MCP-server med Streamable HTTP. Lås versioner vid implementation.
    "mcp",                 # eller "fastmcp"
    "pyyaml",
    "imap-tools",          # IMAP
    "caldav",              # CalDAV
    "requests",            # WebDAV / HTTP
    # Token-validering mot Hydra (JWKS) — bibliotek väljs vid implementation (t.ex. pyjwt + jwks).
]

[project.optional-dependencies]
dev = ["pytest>=8"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
