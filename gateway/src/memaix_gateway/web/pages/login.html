<!doctype html>
<!--MEMAIX_I18N-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Memaix</title>
  <link rel="stylesheet" href="/app/static/app.css">
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
    .login-card{background:var(--surface);border-radius:16px;padding:2.5rem;width:360px;max-width:90vw;box-shadow:0 4px 24px rgba(0,0,0,.4)}
    .login-card h1{font-size:1.4rem;font-weight:700;margin:0 0 .25rem}
    .login-card p{color:var(--muted);font-size:.9rem;margin:0 0 1.5rem}
    .form-group{margin-bottom:1rem}
    .form-group label{display:block;font-size:.85rem;font-weight:600;margin-bottom:.4rem;color:var(--muted)}
    .form-group input{width:100%;box-sizing:border-box;padding:.6rem .8rem;border:1px solid var(--border);border-radius:8px;font-size:.95rem;background:var(--background);color:var(--text)}
    .form-group input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,.15)}
    .login-error{color:var(--danger);font-size:.85rem;margin-top:.75rem;min-height:1.2em}
  </style>
</head>
<body>
<div class="login-card">
  <h1>Memaix</h1>
  <p id="login-subtitle">Logga in för att fortsätta</p>
  <div class="form-group">
    <label for="login-user" id="login-label-user">Användarnamn</label>
    <input id="login-user" type="text" autocomplete="username" autofocus>
  </div>
  <div class="form-group">
    <label for="login-pass" id="login-label-pass">Lösenord</label>
    <input id="login-pass" type="password" autocomplete="current-password">
  </div>
  <button class="btn" id="login-btn">Logga in</button>
  <div class="login-error" id="login-error"></div>
</div>
<script>
(() => {
  const t = k => (window.I18N && window.I18N[k] && window.I18N[k] !== k) ? window.I18N[k] : null;
  const setText = (id, key, fallback) => { document.getElementById(id).textContent = t(key) ?? fallback; };
  setText('login-subtitle',   'login_subtitle',         'Logga in för att fortsätta');
  setText('login-label-user', 'login_label_username',   'Användarnamn');
  setText('login-label-pass', 'login_label_password',   'Lösenord');
  setText('login-btn',        'login_btn',              'Logga in');

  const next = (() => {
    const raw = new URLSearchParams(location.search).get('next') || '/app';
    // Guard: only allow same-origin redirects.
    try { return new URL(raw, location.origin).pathname + new URL(raw, location.origin).search; }
    catch { return '/app'; }
  })();

  async function login() {
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('login-error');
    const u = document.getElementById('login-user').value.trim();
    const p = document.getElementById('login-pass').value;
    err.textContent = '';
    btn.disabled = true;
    try {
      const r = await fetch('/board/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username: u, password: p}),
        credentials: 'include',
      });
      if (r.ok) { location.href = next; return; }
      err.textContent = t('login_error_credentials') ?? 'Fel användarnamn eller lösenord.';
    } catch {
      err.textContent = t('login_error_server') ?? 'Serverfel, försök igen.';
    } finally {
      btn.disabled = false;
    }
  }

  document.getElementById('login-btn').addEventListener('click', login);
  document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  document.getElementById('login-user').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('login-pass').focus(); });
})();
</script>
</body>
</html>
