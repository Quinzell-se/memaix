<h1 class="page-title" data-i18n="web_search_title">Search</h1>
<div class="card">
  <form id="search-form" class="search-form">
    <input type="search" id="search-q" placeholder="…" autofocus>
    <button class="btn btn-primary" type="submit" data-i18n="web_search_go">Search</button>
  </form>
  <div id="search-meta" class="muted"></div>
  <ul id="search-results" class="search-results"></ul>
  <div id="search-empty" class="empty-state" hidden data-i18n="web_search_empty">No results.</div>
</div>
<script src="/app/static/search.js"></script>
