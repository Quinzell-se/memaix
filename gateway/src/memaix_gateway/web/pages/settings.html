<h1 class="page-title" data-i18n="web_settings_title">Settings</h1>
<div class="home-grid">
  <div class="card" id="accounts">
    <h2 data-i18n="web_settings_accounts">Linked accounts</h2>
    <ul id="accounts-list" class="todo-list"></ul>
    <div id="accounts-empty" class="empty-state" hidden data-i18n="web_settings_accounts_empty">No linked accounts.</div>
    <div class="settings-actions">
      <button class="btn btn-primary" id="link-google" data-i18n="web_settings_link_google">Link Google account</button>
      <button class="btn btn-primary" id="link-microsoft" data-i18n="web_settings_link_microsoft">Link Microsoft account</button>
    </div>
  </div>
  <div class="card" id="brief">
    <h2 data-i18n="web_brief_title">Daily brief</h2>
    <div class="muted" id="brief-status"></div>
    <form id="brief-form" class="settings-form">
      <label><input type="checkbox" id="brief-enabled"> <span data-i18n="web_brief_enabled">Enabled</span></label>
      <input type="time" id="brief-time" value="07:00">
      <input type="text" id="brief-timezone" placeholder="Europe/Stockholm">
      <button class="btn btn-primary" type="submit" data-i18n="web_save">Save</button>
    </form>
  </div>
  <div class="card" id="calendar-mode">
    <h2 data-i18n="web_settings_calendar">Calendar access</h2>
    <div class="muted" id="calendar-current"></div>
    <form id="calendar-form" class="settings-form">
      <select id="calendar-mode-select">
        <option value="oauth" data-i18n="web_calmode_oauth">OAuth — use linked Google account</option>
        <option value="ical_secret" data-i18n="web_calmode_ical">Secret iCal URL (read-only)</option>
        <option value="free_busy" data-i18n="web_calmode_freebusy">Free/busy only</option>
        <option value="none" data-i18n="web_calmode_none">None — remove calendar link</option>
      </select>
      <input type="url" id="calendar-ical-url" placeholder="https://calendar.google.com/calendar/ical/…" hidden>
      <input type="text" id="calendar-calendar-id" placeholder="your@calendar.id" hidden>
      <button class="btn btn-primary" type="submit" data-i18n="web_save">Save</button>
    </form>
  </div>
</div>
<script src="/app/static/settings.js"></script>
