<div class="home-grid">
  <div class="card todo-card">
    <h2 data-i18n="web_home_todo">To do</h2>
    <ul id="todo-list" class="todo-list"></ul>
    <div id="todo-empty" class="empty-state" hidden data-i18n="web_home_todo_empty">Nothing needs your attention.</div>
  </div>
  <div class="card">
    <h2 data-i18n="web_home_projects">My projects</h2>
    <div class="projects-grid" id="projects-grid"></div>
  </div>
  <div class="card">
    <h2 data-i18n="web_home_activity">Activity</h2>
    <div class="activity-feed" id="activity-feed"></div>
  </div>
  <div class="card">
    <h2 data-i18n="web_timeline_title">Timeline</h2>
    <div class="activity-feed" id="timeline-feed"></div>
    <div id="timeline-empty" class="empty-state" hidden data-i18n="web_timeline_empty">No recorded actions.</div>
  </div>
</div>
