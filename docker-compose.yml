# Memaix — single-tenant deployment. En instans per kund.
# Tjänster: gateway (kärnan) + valfri cloudflared (tunnel) + valfri nextcloud (backend).

services:
  gateway:
    build: ./gateway
    image: memaix/gateway:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./config:/app/config:ro            # brand.yaml, memaix.yaml, acl.yaml
      - ./vaults:/srv/vaults               # git-versionerade minnesvaults
    ports:
      - "127.0.0.1:8080:8080"              # exponeras INTE direkt; via tunnel/reverse proxy
    # Gatewayen läser config/memaix.yaml för domän, auth och backends.

  # Valfritt: Cloudflare-tunnel. Tar bort behovet av portöppning; ger auto-TLS.
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on: [gateway]
    profiles: ["tunnel"]                   # aktivera med: docker compose --profile tunnel up -d

  # Valfritt: Nextcloud som backend för kalender (CalDAV) + filer (WebDAV).
  # Hoppa över om kunden redan har en filserver/kalender.
  # Admin skapas automatiskt från .env → scripts/bootstrap.py provisionerar resten.
  nextcloud:
    image: nextcloud:latest
    restart: unless-stopped
    environment:
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: "localhost ${NEXTCLOUD_PUBLIC_HOST:-}"
    volumes:
      - nextcloud-data:/var/www/html
    ports:
      - "127.0.0.1:8081:80"               # lokalt, för provisionering (ej publikt)
    healthcheck:
      test: ["CMD", "php", "occ", "status"]
      interval: 10s
      timeout: 5s
      retries: 30
    profiles: ["nextcloud"]               # aktivera med: docker compose --profile nextcloud up -d

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hydra
      POSTGRES_PASSWORD: ${HYDRA_DB_PASSWORD}
      POSTGRES_DB: hydra
    volumes:
      - hydra-db:/var/lib/postgresql/data
    profiles: ["hydra"]

  hydra:
    image: oryd/hydra:v2.2
    restart: unless-stopped
    command: serve all --dev
    environment:
      DSN: postgres://hydra:${HYDRA_DB_PASSWORD}@postgres:5432/hydra?sslmode=disable
      URLS_SELF_ISSUER: ${HYDRA_PUBLIC_URL:-https://mcp.example.com}
      URLS_CONSENT: ${HYDRA_CONSENT_URL:-http://localhost:3000/consent}
      URLS_LOGIN: ${HYDRA_LOGIN_URL:-http://localhost:3000/login}
      SECRETS_SYSTEM: ${HYDRA_SYSTEM_SECRET}
    ports:
      - "127.0.0.1:4444:4444"   # public API
      - "127.0.0.1:4445:4445"   # admin API
    depends_on: [postgres]
    profiles: ["hydra"]

volumes:
  nextcloud-data:
  hydra-db:
