# Memaix — single-tenant deployment. En instans per kund.
# Tjänster: gateway (kärnan) + valfri cloudflared (tunnel) + valfri nextcloud (backend).

services:
  gateway:
    build: ./gateway
    image: memaix/gateway:latest
    restart: unless-stopped
    env_file: .env
    environment:
      MEMAIX_TRANSPORT: http
    volumes:
      - ./config:/app/config:ro            # brand.yaml, memaix.yaml, acl.yaml
      - ./vaults:/srv/vaults               # git-versionerade minnesvaults
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      hydra:
        condition: service_started
    profiles: ["hydra"]

  login-app:
    build: ./login-app
    image: memaix/login-app:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./config/acl.yaml:/app/config/acl.yaml:ro
    profiles: ["hydra"]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    ports:
      - "127.0.0.1:80:80"
    depends_on:
      - gateway
      - hydra
      - login-app
    profiles: ["hydra"]

  # Valfritt: Cloudflare-tunnel. Tar bort behovet av portöppning; ger auto-TLS.
  #
  # VARNING (driftlärdom): token-läget är FJÄRRHANTERAT — ingress-reglerna läses
  # från Cloudflares API vid uppstart, inte live. Om konfig-versionen där saknar
  # hostname-regler (t.ex. en oavsiktlig "source: local"-version som ersatte
  # dashboard-reglerna) svarar tunneln 503 på allt, trots "healthy". Föredra
  # tunnel-local-profilen nedan för drift.
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on: [caddy]
    profiles: ["tunnel"]                   # aktivera med: docker compose --profile tunnel up -d

  # Rekommenderad för drift: LOKALT hanterad tunnel. Ingress-reglerna ligger i
  # ./cloudflared/config.yml (se config.example.yml för uppsättning) — en fil i
  # deployen som en omstart eller en fjärrkonfig-version aldrig kan nolla.
  cloudflared-local:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    depends_on: [caddy]
    profiles: ["tunnel-local"]             # aktivera med: docker compose --profile tunnel-local up -d

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hydra
      POSTGRES_PASSWORD: ${HYDRA_DB_PASSWORD}
      POSTGRES_DB: hydra
    volumes:
      - hydra-db:/var/lib/postgresql/data
    profiles: ["hydra"]

  hydra:
    image: oryd/hydra:v2.2
    restart: unless-stopped
    command: serve all --dev
    environment:
      DSN: postgres://hydra:${HYDRA_DB_PASSWORD}@postgres:5432/hydra?sslmode=disable
      URLS_SELF_ISSUER: ${HYDRA_PUBLIC_URL:-https://mcp.example.com/}
      URLS_CONSENT: ${HYDRA_CONSENT_URL:-https://mcp.example.com/consent}
      URLS_LOGIN: ${HYDRA_LOGIN_URL:-https://mcp.example.com/login}
      SECRETS_SYSTEM: ${HYDRA_SYSTEM_SECRET}
      LOG_LEVEL: debug
      LOG_LEAK_SENSITIVE_VALUES: "true"
      STRATEGIES_ACCESS_TOKEN: jwt
      OIDC_DYNAMIC_CLIENT_REGISTRATION_ENABLED: "true"
      SERVE_PUBLIC_CORS_ENABLED: "true"
      SERVE_PUBLIC_CORS_ALLOWED_ORIGINS: "https://claude.ai,https://api.claude.ai"
      SERVE_PUBLIC_CORS_ALLOWED_METHODS: "GET,POST,PUT,DELETE,OPTIONS"
    ports:
      - "127.0.0.1:4444:4444"   # public API
      - "127.0.0.1:4445:4445"   # admin API
    depends_on: [postgres]
    profiles: ["hydra"]

  # Valfritt: Nextcloud som backend för kalender (CalDAV) + filer (WebDAV).
  nextcloud:
    image: nextcloud:latest
    restart: unless-stopped
    environment:
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: "localhost ${NEXTCLOUD_PUBLIC_HOST:-}"
    volumes:
      - nextcloud-data:/var/www/html
    ports:
      - "127.0.0.1:8081:80"
    profiles: ["nextcloud"]

volumes:
  nextcloud-data:
  hydra-db:
