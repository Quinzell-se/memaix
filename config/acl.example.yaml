# Åtkomststyrning: vem (users) får vilka projekt (grants), och vad varje projekt innehåller.
# Kopiera till acl.yaml. Hemligheter lagras i .env och refereras via *_ref.

users:
  owner:
    oauth_sub: "owner@example.com"
    grants: { acme: owner, shared: owner }
  teammate:
    oauth_sub: "bob@example.com"
    grants: { acme: collaborator, shared: collaborator }
  external:
    oauth_sub: "contractor@example.com"
    grants: { acme: collaborator }        # BARA detta projekt — ser inget annat

# Roller:
#   owner        – läs/skriv allt + beslutar backlog-status
#   collaborator – läs/skriv arbetsresurser + lägger till/poängsätter backlog
#   reader       – läs

projects:
  acme:
    mailbox:
      imap_host: "imap.example.com"
      smtp_host: "smtp.example.com"
      user: "team@acme.example.com"
      password_ref: "PM_ACME_IMAP_PASSWORD"     # → .env
    calendar: "https://cloud.example.com/remote.php/dav/calendars/acme/work/"
    files:    "https://cloud.example.com/remote.php/dav/files/acme/Acme/"
    files_password_ref: "NEXTCLOUD_ACME_APP_PASSWORD"
    code:     { forge: forgejo, repo: "team/acme-app", token_ref: "FORGE_ACME" }  # github | gitlab | forgejo | gitea
    vault: "/srv/vaults/acme"
  shared:
    vault: "/srv/vaults/shared"                 # om-filer, manual, skrivstil (ej projektresurser)
