users:
  alice:
    # OAuth subject från Hydra. Sätts till användarnamnet vi angav vid inloggning.
    oauth_subjects:
      - alice
    grants:
      acme: owner
      project-a: owner
      project-b: owner
      personal: owner
      shared: owner

projects:
  acme:
    vault: /srv/vaults/acme
    allow_send: true
    # Per-user Google Calendar — each user links their own account via account_link("google")
    # calendar:
    #   type: google
    #   auth: per_user
    #
    # Outbox (FEATURE-APPROVAL-OUTBOX.md): gate outgoing/hard-to-undo actions
    # (email_send, calendar_create/update) behind human approval.
    #   outbox: review          # 'auto' (default, unchanged behaviour) | 'review'
    #   allowlist:               # optional — force 'review' for any recipient
    #     - "@trusted-client.example"    # not on this list, even in 'auto' mode
    #     - "specific@partner.example"
    #
    # Contacts (FEATURE-NEXTCLOUD-BACKEND.md) — enables contacts_search/contacts_get.
    # 'type' defaults to 'carddav' (the only adapter registered today).
    # contacts:
    #   url: "https://cloud.example.com/remote.php/dav/addressbooks/users/acme/contacts/"
    #   user: "acme@example.com"
    #   password_ref: "env:ACME_NEXTCLOUD_APP_PASSWORD"
    #
    # Files (FEATURE-NEXTCLOUD-BACKEND.md) — enables nc_files_list/read/write/search.
    # A separate resource from `vault` (the local, always-on project vault) —
    # this is an *additional* files source, e.g. a client's shared Nextcloud
    # folder. 'type' defaults to 'webdav' (the only adapter registered today).
    # files:
    #   url: "https://cloud.example.com/remote.php/dav/files/acme/Projects/acme/"
    #   user: "acme@example.com"
    #   password_ref: "env:ACME_NEXTCLOUD_APP_PASSWORD"
  project-a:
    vault: /srv/vaults/project-a
    allow_send: true
  project-b:
    vault: /srv/vaults/project-b
    allow_send: false
  personal:
    vault: /srv/vaults/personal
    allow_send: true
  shared:
    vault: /srv/vaults/shared
    allow_send: false
  memaix-src:
    vault: /srv/vaults/memaix-src
    allow_send: false
