# Memaix CI. GitHub Actions-format — kör även på Forgejo/Gitea Actions (samma YAML).
name: ci

on: [push, pull_request]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Installera gateway + dev-beroenden
        run: pip install -e "gateway[dev]"
      - name: Docs-index-hygien
        run: python3 scripts/check-docs-index.py
      - name: Python-syntax (scripts + hela paketet)
        run: |
          python3 -m py_compile scripts/*.py
          python3 -m compileall -q gateway/src/memaix_gateway
      - name: Testsvit
        working-directory: gateway
        run: python -m pytest -q
      - name: Lint (ruff)
        working-directory: gateway
        run: python -m ruff check src/memaix_gateway
      - name: Typkontroll (mypy)
        working-directory: gateway
        run: python -m mypy src/memaix_gateway
      - name: Säkerhetsanalys (bandit)
        working-directory: gateway
        run: python -m bandit -q -r src/memaix_gateway -c pyproject.toml
      - name: Beroende-sårbarheter (pip-audit)
        working-directory: gateway
        # Scans installed deps against the PyPI advisory DB (OPEN-GAPS #5).
        # Audit a freeze WITHOUT the editable gateway: the local package isn't
        # on PyPI, and under --strict pip-audit errors on it both when trying
        # to audit it AND when skipping it (--skip-editable still exits 1).
        # Freezing with --exclude-editable keeps --strict for every real dep.
        run: |
          pip install pip-audit
          pip freeze --exclude-editable > /tmp/audit-reqs.txt
          python -m pip_audit --strict --desc -r /tmp/audit-reqs.txt

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generera SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cdx.json
      # TODO: lägg image-scanning (t.ex. trivy/grype) när images byggs.
